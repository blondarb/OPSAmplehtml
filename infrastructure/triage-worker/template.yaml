  EmergencyAlertWorkQueueUrl:
    Value: !Ref EmergencyAlertWorkQueue
  EmergencyAlertWorkQueueArn:
    Value: !GetAtt EmergencyAlertWorkQueue.Arn
  EmergencyAlertDeadLetterQueueUrl:
    Value: !Ref EmergencyAlertWorkDeadLetterQueue
  EmergencyAlertDeliveryQueueUrl:
    Value: !Ref EmergencyAlertDeliveryQueue
  EmergencyAlertDeliveryQueueArn:
    Value: !GetAtt EmergencyAlertDeliveryQueue.Arn
  EmergencyAlertDeliveryDeadLetterQueueUrl:
    Value: !Ref EmergencyAlertDeliveryDeadLetterQueue
  AlarmTopicArn:
    Value: !Ref TriageWorkerAlarmTopic
